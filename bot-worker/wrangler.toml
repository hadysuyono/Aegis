name = "aegis-bot"
main = "src/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "AEGIS_KV"
id = "71cb7cf20b9848eb9209d99293dafe8f"

# Cloudflare Workers AI untuk image generation (Flux Schnell - free tier)
[ai]
binding = "AI"

# 1 cron tiap 10 menit — dispatch internal per slot waktu (workers free max 5 cron)
[triggers]
crons = ["*/10 * * * *"]
